<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KM Interiores · Redefinir senha</title>
<link rel="icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@0,400;0,500;0,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080807;--bg2:#0f0e0c;--bg3:#15130f;--text:#F1E9D2;--muted:rgba(241,233,210,.68);--accent:#CB984C;--champagne:#F1E4C9;--ouro:#9D7D31;--line:rgba(203,152,76,.16);--serif:'Playfair Display',Georgia,serif;--sans:'Inter',system-ui,sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background-image:radial-gradient(90% 80% at 80% 10%,rgba(203,152,76,.10),transparent 55%),linear-gradient(160deg,#100e0b,#080807)}
  .card{width:100%;max-width:420px;background:var(--bg2);border:1px solid var(--line);padding:40px 36px;text-align:center}
  .card img{height:78px;margin-bottom:6px}
  .ttl{font-family:var(--serif);font-size:20px;color:var(--accent);letter-spacing:.04em}
  .sub{font-size:12px;color:var(--muted);margin:6px 0 26px;letter-spacing:.05em;line-height:1.6}
  label{display:block;text-align:left;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--champagne);margin:0 0 7px}
  input{width:100%;background:var(--bg3);border:1px solid var(--line);color:var(--text);padding:13px 14px;font-family:var(--sans);font-size:14px;outline:none;margin-bottom:16px}
  input:focus{border-color:var(--accent)}
  button{width:100%;background:var(--accent);color:#080807;border:none;padding:15px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;cursor:pointer;transition:.25s}
  button:hover{background:var(--champagne)}
  button:disabled{opacity:.6;cursor:default}
  .msg{margin-top:16px;font-size:12.5px;color:var(--ouro);min-height:16px;line-height:1.6}
  .msg.ok{color:#bcd39a}
  a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
  <div class="card">
    <img src="logo.png" alt="KM Interiores">
    <div class="ttl">Redefinir senha</div>
    <div class="sub" id="sub">Defina uma nova senha de acesso.</div>
    <div id="form">
      <label>Nova senha (mín. 6)</label>
      <input id="pw1" type="password" placeholder="••••••••" autocomplete="new-password">
      <label>Confirmar nova senha</label>
      <input id="pw2" type="password" placeholder="••••••••" autocomplete="new-password">
      <button id="btn">Salvar nova senha</button>
    </div>
    <div class="msg" id="msg"></div>
  </div>
<script>
  var SB='https://hpbtnlfihbwwawgtesvm.supabase.co', KEY='sb_publishable_zhEVk-8dxOCc8Hq5BuIZkA_fR_8gbOE';
  var $=function(id){return document.getElementById(id);};
  // Captura tokens do hash do link de recuperação (#access_token=...&type=recovery)
  function parseHash(){
    var h=(location.hash||'').replace(/^#/,''); var o={};
    h.split('&').forEach(function(p){ var kv=p.split('='); if(kv[0]) o[decodeURIComponent(kv[0])]=decodeURIComponent(kv[1]||''); });
    return o;
  }
  var H=parseHash(), TOKEN=H.access_token||'';
  if(!TOKEN){
    $('form').style.display='none';
    $('msg').innerHTML='Link inválido ou expirado. <a href="crm.html">Voltar ao painel</a> e clicar de novo em "Esqueci minha senha".';
  } else if(H.error_description){
    $('form').style.display='none';
    $('msg').textContent=H.error_description;
  }
  function salvar(){
    var a=$('pw1').value, b=$('pw2').value;
    if(a.length<6){ $('msg').className='msg'; $('msg').textContent='A senha precisa ter ao menos 6 caracteres.'; return; }
    if(a!==b){ $('msg').className='msg'; $('msg').textContent='As senhas não conferem.'; return; }
    $('btn').disabled=true; $('btn').textContent='Salvando…'; $('msg').className='msg'; $('msg').textContent='';
    fetch(SB+'/auth/v1/user',{method:'PUT',headers:{apikey:KEY,Authorization:'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify({password:a})})
    .then(function(r){ return r.json().then(function(j){return {ok:r.ok,j:j};}); })
    .then(function(res){
      $('btn').disabled=false; $('btn').textContent='Salvar nova senha';
      if(res.ok){ $('form').style.display='none'; $('msg').className='msg ok'; $('msg').innerHTML='✓ Senha redefinida com sucesso. <a href="crm.html">Ir para o login</a>.'; }
      else { $('msg').textContent=(res.j&&(res.j.msg||res.j.error_description||res.j.error))||'Não foi possível redefinir. O link pode ter expirado.'; }
    })
    .catch(function(){ $('btn').disabled=false; $('btn').textContent='Salvar nova senha'; $('msg').textContent='Erro de conexão. Tente novamente.'; });
  }
  if($('btn')) $('btn').addEventListener('click', salvar);
  if($('pw2')) $('pw2').addEventListener('keydown', function(e){ if(e.key==='Enter') salvar(); });
</script>
</body>
</html>
